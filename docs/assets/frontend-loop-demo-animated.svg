<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">cc-devtools animated Frontend Loop demo</title>
  <desc id="desc">Animated loop showing Step 1: F12 chat, Step 2: Project scan, Step 3: Write local JSON, and Step 4: Browser verification with Singapore.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e9eef6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#101828" flood-opacity=".18"/>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #526071; }
      .ink { fill: #17202a; }
      .panel { filter: url(#shadow); }
      .step { opacity: .28; }
      .step text { fill: #c6d4e8; }
      .step-active { opacity: 1; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="64" y="72" class="font ink" font-size="38" font-weight="800">cc-devtools Frontend Loop</text>
  <text x="64" y="110" class="font muted" font-size="20">F12 chat -> Project scan -> Write local JSON -> Browser verification</text>

  <g class="panel">
    <rect x="64" y="150" width="612" height="472" rx="10" fill="#fff" stroke="#d8dee8"/>
    <rect x="64" y="150" width="612" height="46" rx="10" fill="#17202a"/>
    <circle cx="94" cy="173" r="6" fill="#ff5f57"/>
    <circle cx="116" cy="173" r="6" fill="#febc2e"/>
    <circle cx="138" cy="173" r="6" fill="#28c840"/>
    <text x="166" y="180" class="font" fill="#d9e2f2" font-size="15">http://localhost:5173</text>

    <text x="100" y="252" class="font" fill="#2456d6" font-size="13" font-weight="800">COUNTRY SELECTOR LOOP DEMO</text>
    <text x="100" y="302" class="font ink" font-size="34" font-weight="800">Patch local data,</text>
    <text x="100" y="342" class="font ink" font-size="34" font-weight="800">then verify it live.</text>

    <rect x="100" y="392" width="510" height="116" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
    <text x="124" y="424" class="font muted" font-size="13" font-weight="800">COUNTRY</text>
    <rect x="124" y="442" width="244" height="42" rx="6" fill="#fff" stroke="#b8c2d2"/>
    <text x="142" y="469" class="font ink" font-size="15">
      United States (US)
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;.44;.50;.90;.94;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="142" y="469" class="font ink" font-size="15" opacity="0">
      Singapore (SG)
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.50;.56;.90;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <rect x="382" y="442" width="84" height="42" rx="6" fill="#fff" stroke="#a9b5c7"/>
    <text x="404" y="469" class="font ink" font-size="14">Reload</text>
    <rect x="480" y="442" width="106" height="42" rx="6" fill="#087f5b"/>
    <text x="510" y="469" class="font" fill="#fff" font-size="14" font-weight="700">Verify</text>

    <rect x="100" y="526" width="510" height="58" rx="8" fill="#f1fbf6" stroke="#bdd7cc"/>
    <text x="124" y="561" class="font" fill="#0b513d" font-size="17" font-weight="700" opacity="0">
      Verified: Singapore (SG) is selectable from local data.
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.58;.66;.92;1" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="124" y="561" class="font muted" font-size="17">
      Waiting for selection.
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;.58;.66;.92;.96;1" dur="8s" repeatCount="indefinite"/>
    </text>
  </g>

  <g class="panel">
    <rect x="720" y="150" width="496" height="472" rx="10" fill="#101828"/>
    <rect x="720" y="150" width="496" height="46" rx="10" fill="#1d2939"/>
    <text x="750" y="180" class="font" fill="#f2f4f7" font-size="16" font-weight="800">F12 chat</text>
    <text x="1158" y="180" class="font" fill="#9fb0c8" font-size="14">Frontend Loop</text>

    <g id="step-chat" class="step">
      <animate attributeName="opacity" values="1;1;.28;.28;.28;1" keyTimes="0;.22;.30;.94;.98;1" dur="8s" repeatCount="indefinite"/>
      <rect x="750" y="224" width="422" height="70" rx="8" fill="#243147"/>
      <text x="772" y="252" class="font" fill="#e6edf8" font-size="15" font-weight="800">Step 1: F12 chat</text>
      <text x="772" y="276" class="font" fill="#e6edf8" font-size="15">Add Singapore to the country selector.</text>
    </g>

    <g id="step-scan" class="step">
      <animate attributeName="opacity" values=".28;.28;1;1;.28;.28" keyTimes="0;.22;.30;.44;.52;1" dur="8s" repeatCount="indefinite"/>
      <rect x="750" y="318" width="422" height="58" rx="8" fill="#182230" stroke="#31415a"/>
      <text x="772" y="343" class="font" fill="#98c7ff" font-size="15" font-weight="800">Step 2: Project scan</text>
      <text x="772" y="365" class="font" fill="#c6d4e8" font-size="14">framework, scripts, data candidates</text>
    </g>

    <g id="step-write" class="step">
      <animate attributeName="opacity" values=".28;.28;.28;1;1;.28;.28" keyTimes="0;.40;.48;.52;.64;.72;1" dur="8s" repeatCount="indefinite"/>
      <rect x="750" y="398" width="422" height="58" rx="8" fill="#182230" stroke="#31415a"/>
      <text x="772" y="423" class="font" fill="#a7f3d0" font-size="15" font-weight="800">Step 3: Write local JSON</text>
      <text x="772" y="445" class="font" fill="#c6d4e8" font-size="14">countries.json gets Singapore</text>
    </g>

    <g id="step-verify" class="step">
      <animate attributeName="opacity" values=".28;.28;.28;.28;1;1;.28" keyTimes="0;.58;.66;.70;.74;.90;1" dur="8s" repeatCount="indefinite"/>
      <rect x="750" y="478" width="422" height="58" rx="8" fill="#182230" stroke="#31415a"/>
      <text x="772" y="503" class="font" fill="#fde68a" font-size="15" font-weight="800">Step 4: Browser verification</text>
      <text x="772" y="525" class="font" fill="#c6d4e8" font-size="14">select, click Verify, read output</text>
    </g>

    <rect x="750" y="560" width="422" height="38" rx="8" fill="#073b2a" stroke="#0f8f68"/>
    <text x="772" y="584" class="font" fill="#d1fae5" font-size="14" font-weight="800">Evidence: #verification-output contains Singapore</text>
  </g>

  <path d="M676 386 C700 386 702 386 720 386" stroke="#2456d6" stroke-width="4" fill="none"/>
  <path d="M705 374 L722 386 L705 398" fill="none" stroke="#2456d6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
