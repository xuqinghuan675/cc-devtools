<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">cc-devtools Frontend Loop demo</title>
  <desc id="desc">F12 chat drives a project scan, writes local JSON, and verifies Singapore in the browser.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#101828" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#page)"/>
  <text x="64" y="74" fill="#17202a" font-family="Inter,Segoe UI,sans-serif" font-size="38" font-weight="800">cc-devtools Frontend Loop</text>
  <text x="64" y="112" fill="#526071" font-family="Inter,Segoe UI,sans-serif" font-size="20">F12 chat -> Project scan -> Write local JSON -> Browser verification</text>

  <g filter="url(#shadow)">
    <rect x="64" y="150" width="620" height="472" rx="10" fill="#ffffff" stroke="#d8dee8"/>
    <rect x="64" y="150" width="620" height="46" rx="10" fill="#17202a"/>
    <circle cx="94" cy="173" r="6" fill="#ff5f57"/>
    <circle cx="116" cy="173" r="6" fill="#febc2e"/>
    <circle cx="138" cy="173" r="6" fill="#28c840"/>
    <text x="166" y="180" fill="#d9e2f2" font-family="Inter,Segoe UI,sans-serif" font-size="15">http://localhost:5173</text>

    <text x="100" y="252" fill="#2456d6" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="800">COUNTRY SELECTOR LOOP DEMO</text>
    <text x="100" y="302" fill="#17202a" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="800">Patch local data,</text>
    <text x="100" y="342" fill="#17202a" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="800">then verify it live.</text>

    <rect x="100" y="392" width="510" height="116" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
    <text x="124" y="424" fill="#526071" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="800">COUNTRY</text>
    <rect x="124" y="442" width="244" height="42" rx="6" fill="#ffffff" stroke="#b8c2d2"/>
    <text x="142" y="469" fill="#17202a" font-family="Inter,Segoe UI,sans-serif" font-size="15">Singapore (SG)</text>
    <rect x="382" y="442" width="84" height="42" rx="6" fill="#ffffff" stroke="#a9b5c7"/>
    <text x="404" y="469" fill="#17202a" font-family="Inter,Segoe UI,sans-serif" font-size="14">Reload</text>
    <rect x="480" y="442" width="106" height="42" rx="6" fill="#087f5b"/>
    <text x="510" y="469" fill="#ffffff" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700">Verify</text>

    <rect x="100" y="526" width="510" height="58" rx="8" fill="#f1fbf6" stroke="#bdd7cc"/>
    <text x="124" y="561" fill="#0b513d" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">Verified: Singapore (SG) is selectable from local data.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="150" width="496" height="472" rx="10" fill="#101828"/>
    <rect x="720" y="150" width="496" height="46" rx="10" fill="#1d2939"/>
    <text x="750" y="180" fill="#f2f4f7" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="800">F12 chat</text>
    <text x="1158" y="180" fill="#9fb0c8" font-family="Inter,Segoe UI,sans-serif" font-size="14">Frontend Loop</text>

    <rect x="750" y="224" width="422" height="70" rx="8" fill="#243147"/>
    <text x="772" y="254" fill="#e6edf8" font-family="Inter,Segoe UI,sans-serif" font-size="15">Add Singapore to the country selector.</text>
    <text x="772" y="276" fill="#e6edf8" font-family="Inter,Segoe UI,sans-serif" font-size="15">Use local JSON, then verify it.</text>

    <rect x="750" y="322" width="422" height="50" rx="8" fill="#182230" stroke="#31415a"/>
    <text x="772" y="353" fill="#98c7ff" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700">Project scan</text>
    <text x="884" y="353" fill="#c6d4e8" font-family="Inter,Segoe UI,sans-serif" font-size="15">framework, scripts, data candidates</text>

    <rect x="750" y="392" width="422" height="50" rx="8" fill="#182230" stroke="#31415a"/>
    <text x="772" y="423" fill="#a7f3d0" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700">Write local JSON</text>
    <text x="914" y="423" fill="#c6d4e8" font-family="Inter,Segoe UI,sans-serif" font-size="15">countries.json + Singapore</text>

    <rect x="750" y="462" width="422" height="50" rx="8" fill="#182230" stroke="#31415a"/>
    <text x="772" y="493" fill="#fde68a" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700">Browser verification</text>
    <text x="944" y="493" fill="#c6d4e8" font-family="Inter,Segoe UI,sans-serif" font-size="15">click, select, read output</text>

    <rect x="750" y="542" width="422" height="46" rx="8" fill="#073b2a" stroke="#0f8f68"/>
    <text x="772" y="571" fill="#d1fae5" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="800">Evidence: #verification-output contains Singapore</text>
  </g>

  <path d="M684 386 C706 386 704 386 720 386" stroke="#2456d6" stroke-width="4" fill="none"/>
  <path d="M705 374 L722 386 L705 398" fill="none" stroke="#2456d6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
